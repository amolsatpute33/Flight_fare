<!DOCTYPE html>
<html>
<head>
    <title>Flight Fare Predictor</title>
</head>
<body>

<h2>Flight Fare Prediction</h2>

<form action="/predict" method="post">
    Airline: <input type="text" name="airline"><br><br>
    Stops: <input type="text" name="stops"><br><br>
    Class: <input type="text" name="class"><br><br>
    Duration: <input type="number" step="0.1" name="duration"><br><br>
    <input type="submit" value="Predict">
</form>

</body>
</html>
